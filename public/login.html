<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shareamigo — Login</title>
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <!-- Theme toggle works on login page too -->
  <div class="theme-bar">
    <button class="theme-btn" onclick="setTheme('light')">Light</button>
    <button class="theme-btn" onclick="setTheme('system')">Auto</button>
    <button class="theme-btn active" onclick="setTheme('dark')">Dark</button>
  </div>

  <div id="login-page">

    <div class="auth-card">

      <div class="auth-logo">Shareamigo</div>
      <div class="auth-tagline">Share anything · Instantly · Anywhere</div>

      <!-- Messages -->
      <div id="auth-error"></div>
      <div id="auth-loading"></div>

      <!-- ── LOGIN FORM ── -->
      <div id="login-form">
        <div class="auth-title">Welcome back</div>

        <input class="auth-input" type="email"
               id="login-email" placeholder="Email address" />

        <input class="auth-input" type="password"
               id="login-password" placeholder="Password" />

        <button class="auth-btn auth-btn-primary" onclick="login()">
          Sign In →
        </button>

        <div class="auth-divider">or</div>

        <button class="auth-btn auth-btn-google" onclick="loginWithGoogle()">
          <img class="google-icon"
               src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
               alt="Google" />
          Continue with Google
        </button>

        <button class="auth-btn auth-btn-guest" onclick="continueAsGuest()">
          Continue as Guest
        </button>

        <div class="auth-switch">
          No account? <span onclick="showSignup()">Create one</span>
        </div>
      </div>

      <!-- ── SIGNUP FORM ── -->
      <div id="signup-form" style="display:none">
        <div class="auth-title">Create account</div>

        <input class="auth-input" type="text"
               id="signup-name" placeholder="Your name" />

        <input class="auth-input" type="email"
               id="signup-email" placeholder="Email address" />

        <input class="auth-input" type="password"
               id="signup-password" placeholder="Password (min 6 chars)" />

        <button class="auth-btn auth-btn-primary" onclick="signUp()">
          Create Account →
        </button>

        <div class="auth-divider">or</div>

        <button class="auth-btn auth-btn-google" onclick="loginWithGoogle()">
          <img class="google-icon"
               src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
               alt="Google" />
          Continue with Google
        </button>

        <button class="auth-btn auth-btn-guest" onclick="continueAsGuest()">
          Continue as Guest
        </button>

        <div class="auth-switch">
          Already have an account? <span onclick="showLogin()">Sign in</span>
        </div>
      </div>

    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
